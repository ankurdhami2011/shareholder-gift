{% extends 'base.html' %}
{% block title %}Role Permissions{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Role Permission Management</h2>
    <a href="{% url 'role_list' %}" class="btn btn-secondary">Back to Roles</a>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <table class="table table-bordered table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th style="width: 80px;">#</th>
                    <th>Role Name</th>
                    <th style="width: 140px;">Action</th>
                </tr>
            </thead>
            <tbody>
                {% for role in roles %}
                <tr>
                    <td>{{ forloop.counter }}</td>
                    <td>{{ role.name }}</td>
                    <td>
                        <a href="{% url 'role_permission_edit' role.id %}" class="btn btn-sm btn-warning">
                            Set Permissions
                        </a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center text-muted">No roles found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
